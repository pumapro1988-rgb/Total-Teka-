<!DOCTYPE html>
<html lang="es">
<head>
  <title>Total-Teka</title>
  <meta charset="UTF-8">
  <meta name="author" content="Pumapro">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    *{ margin: 0; padding: 0; box-sizing: border-box; }
    body{ background: #000; color: white; font-family: sans-serif; }
    .titulo{ width: 100%; }
    nav{ text-align: center; padding: 10px; }
    #cards { display: flex; justify-content: space-evenly; flex-wrap: wrap; min-height: 200px; }
    .tarjeta { position: relative; width: 171px; margin: 20px 0; text-align: center; border: 1px solid #ccc; font-weight: bold; }
    .tarjeta.manga { background-color: #257AF8; border-color: #257AF8; }
    .tarjeta.pelicula { background-color: black; border-color: #333; }
    .images img { width: 170px; height: 260px; display: block; object-fit: cover; }    
    .tarjeta .h2 { font-size: 0.9rem; margin: 10px 5px; }    
    .tarjeta .h3 { font-size: 0.8rem; position: absolute; padding: 4px; top: 0; right: 0; z-index: 10; background: rgba(0,0,0,0.5); }    
    #paginacion { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
    #paginacion button { padding: 8px 12px; border: none; border-radius: 4px; background: #6c757d; color: white; cursor: pointer; }
    #paginacion button.activo { background: #007bff; }
    footer{ text-align: center; padding: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>
  <img class="titulo" src="https://opkserkawziqdsvkyhky.supabase.co/storage/v1/object/public/imagenes/titulo.png">
  
  <nav>
    <select id="filtroTipo" onchange="aplicarFiltros()">
      <option value="Todos">Todos</option>
      <option value="Manga">Manga</option>
      <option value="Pelicula">Película</option>
    </select>
    <select id="ordenar" onchange="aplicarFiltros()">
      <option value="abc">A-Z</option>
      <option value="año-desc">Más nuevos</option>
    </select>
  </nav>

  <div id="cards">Cargando biblioteca...</div>
  <div id="paginacion"></div>

  <footer>
    <p>Biblioteca de Pumapro y Paloma</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 2. TUS DATOS REALES DE LAS CAPTURAS
    const supabaseUrl = 'https://opkserkawziqdsvkyhky.supabase.co'; 
    const supabaseKey = 'sb_p_48c77395066f2178302066555160533512396452'; // Reemplaza por la llave completa de tu captura
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    let datos = [];
    let datosFiltrados = [];
    let paginaActual = 1;
    const itemsPorPagina = 6;

    // 3. FUNCIÓN PARA CARGAR DESDE LA NUBE
    async function cargarDesdeSupabase() {
      const { data, error } = await _supabase
        .from('biblioteca') // Asegúrate que en Supabase se llame así
        .select('*');

      if (error) {
        document.getElementById("cards").innerHTML = "Error al conectar con la base de datos.";
        console.error(error);
      } else {
        datos = data || [];
        datosFiltrados = [...datos];
        mostrardatos();
      }
    }

    function mostrardatos() {
      const cardsDiv = document.getElementById("cards");
      cardsDiv.innerHTML = "";
      
      if (datosFiltrados.length === 0) {
        cardsDiv.innerHTML = "<p>No hay elementos para mostrar.</p>";
        return;
      }

      const inicio = (paginaActual - 1) * itemsPorPagina;
      const fin = inicio + itemsPorPagina;
      const paginados = datosFiltrados.slice(inicio, fin);

      paginados.forEach(i => {
        const clase = (i.tipo || 'manga').toLowerCase();
        cardsDiv.innerHTML += `
          <div class="tarjeta ${clase}">
            <div class="images"><img src="${i.imagen || ''}" onerror="this.src='https://via.placeholder.com/170x260'"></div>
            <p class="h2">${i.nombre || 'Sin nombre'}</p>
            <p class="h3">${i.año || ''}</p>
          </div>`;
      });
      crearPaginacion();
    }

    function aplicarFiltros() {
      const tipo = document.getElementById('filtroTipo').value;
      const orden = document.getElementById('ordenar').value;

      datosFiltrados = datos.filter(i => tipo === 'Todos' || i.tipo === tipo);

      if (orden === 'abc') datosFiltrados.sort((a,b) => a.nombre.localeCompare(b.nombre));
      if (orden === 'año-desc') datosFiltrados.sort((a,b) => b.año - a.año);

      paginaActual = 1;
      mostrardatos();
    }

    function crearPaginacion() {
      const p = document.getElementById('paginacion');
      p.innerHTML = "";
      const total = Math.ceil(datosFiltrados.length / itemsPorPagina);
      for (let i = 1; i <= total; i++) {
        const b = document.createElement('button');
        b.innerText = i;
        if (i === paginaActual) b.className = 'activo';
        b.onclick = () => { paginaActual = i; mostrardatos(); };
        p.appendChild(b);
      }
    }

    // Iniciar carga
    cargarDesdeSupabase();
  </script>
</body>
</html>
